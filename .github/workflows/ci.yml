name: Build FAudio CI

on: [push, pull_request]

env:
  SDL2_VERSION: 2.30.11
  SDL3_VERSION: 3.2.0

jobs:
  windows-msvc:
    name: Windows MSVC (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        # Define both architectures here
        include:
          - arch: x86
            cmake_arch: Win32
            sdl_lib_path: x86
          - arch: x64
            cmake_arch: x64
            sdl_lib_path: x64

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Cache SDL
      uses: actions/cache@v4
      env:
        cache-name: cache-sdl
      with:
        path: C:\SDL
        key: ${{ runner.os }}-build-${{ env.cache-name }}

    - name: Download SDL if not cached
      run: |
        if (-Not (Test-Path C:\SDL))
        {
            Invoke-WebRequest "https://github.com/libsdl-org/SDL/releases/download/release-$env:SDL3_VERSION/SDL3-devel-$env:SDL3_VERSION-VC.zip" -OutFile C:\SDL.zip
            Expand-Archive C:\SDL.zip -DestinationPath C:\
        }

    - name: CMake configure (Debug)
      run: |
        $env:LDFLAGS =  "/LIBPATH:C:\SDL3-$env:SDL3_VERSION\lib\${{ matrix.sdl_lib_path }} "
        cmake -B debug -G "Visual Studio 17 2022" . -DCMAKE_BUILD_TYPE=Debug `
          -A ${{ matrix.cmake_arch }} `
          -DSDL3_INCLUDE_DIRS="C:\SDL3-$env:SDL3_VERSION\include" `
          -DSDL3_LIBRARIES="SDL3"

    - name: Build (Debug)
      run: cmake --build debug

    - name: CMake configure (Release)
      run: |
        $env:LDFLAGS =  "/LIBPATH:C:\SDL3-$env:SDL3_VERSION\lib\${{ matrix.sdl_lib_path }} "
        cmake -B release -G "Visual Studio 17 2022" . -DCMAKE_BUILD_TYPE=Release `
          -A ${{ matrix.cmake_arch }} `
          -DSDL3_INCLUDE_DIRS="C:\SDL3-$env:SDL3_VERSION\include" `
          -DSDL3_LIBRARIES="SDL3"

    - name: Build (Release)
      run: cmake --build release --config Release

    - name: Package Binaries
      run: |
        mkdir dist
        if (Test-Path "release\Release\FAudio.dll") { copy release\Release\FAudio.dll dist\ }
        Compress-Archive -Path dist\* -DestinationPath FAudio-Win-${{ matrix.arch }}.zip

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FAudio-Win-${{ matrix.arch }}
        path: FAudio-Win-${{ matrix.arch }}.zip

  release:
    name: Create GitHub Release
    needs: windows-msvc
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download x86 Artifact
        uses: actions/download-artifact@v4
        with:
          name: FAudio-Win-x86

      - name: Download x64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: FAudio-Win-x64

      - name: Generate date-based tag
        id: generate_tag
        run: |
          DATE=$(date +%Y%m%d)

          # Get existing tags for today
          EXISTING_TAGS=$(git tag -l "build-${DATE}-*" | sort -V | tail -1)

          if [ -z "$EXISTING_TAGS" ]; then
            BUILD_NUMBER=1
          else
            # Extract build number from last tag and increment
            BUILD_NUMBER=$(echo "$EXISTING_TAGS" | sed "s/build-${DATE}-//" | awk '{print $1 + 1}')
          fi

          TAG_NAME="build-${DATE}-${BUILD_NUMBER}"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG_NAME}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate_tag.outputs.tag_name }}
          name: FAudio Builds (${{ steps.generate_tag.outputs.tag_name }})
          files: |
            FAudio-Win-x86.zip
            FAudio-Win-x64.zip
          draft: false
          prerelease: false